<div class="card shadow-sm border-primary mt-3" *ngIf="product">
  <div class="card-body">
    <h4 class="card-title text-primary">{{ product.name }}</h4>
    <h6 class="card-subtitle mb-2 text-muted">Prezzo: {{ product.price }}€</h6>
    <hr>
    <p class="card-text"><strong>Descrizione:</strong></p>
    <p class="p-2 bg-light rounded">{{ product.description }}</p>
  </div>
</div>

<div *ngIf="!product" class="mt-3 p-3 border rounded text-center text-muted">
  Clicca su un prodotto della lista per vedere i dettagli.
</div>
